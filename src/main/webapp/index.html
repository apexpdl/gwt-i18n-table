<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Inventor Strings Editor — i18n Prototype</title>
  <script type="text/javascript" src="i18ntable/i18ntable.nocache.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* Key column — monospace to match code */
    .i18n-key-cell {
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-size: 12px;
      color: #1565c0;
    }

    /* Untranslated rows get a subtle yellow highlight */
    .i18n-untranslated-row td {
      background-color: #fff8e1 !important;
    }

    /* CellTable style overrides */
    .gwt-CellTable {
      border-collapse: collapse;
      width: 100%;
    }

    .gwt-CellTable th {
      background: #e8eaf6;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #c5cae9;
      font-size: 12px;
      color: #333;
    }

    .gwt-CellTable td {
      padding: 6px 12px;
      border-bottom: 1px solid #e8eaf6;
    }

    .gwt-CellTable tr:hover td {
      background: #f5f5f5;
    }

    /* Buttons */
    .gwt-Button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .gwt-Button:hover {
      background: #1557b0;
    }

    /* ListBox */
    .gwt-ListBox {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px;
      font-size: 12px;
    }

    /* TextBox */
    .gwt-TextBox {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .gwt-TextBox:focus {
      border-color: #1a73e8;
      outline: none;
    }

    /* TextArea */
    .gwt-TextArea {
      border: none;
      border-top: 1px solid #ddd;
      padding: 6px;
      font-size: 11px;
      color: #333;
      background: #fafafa;
      resize: none;
    }
  </style>
</head>
<body>
  <!-- GWT will attach the app here -->
</body>
</html>
